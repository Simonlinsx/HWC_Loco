<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设置字符编码为 UTF-8 -->
    <meta charset="UTF-8">
    <!-- 确保页面在移动设备上能正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题 -->
    <title>我的第一个网站</title>
    <!-- 网站描述，有助于搜索引擎优化 -->
    <meta name="description" content="这是一个正式的网站示例，欢迎访问！">
    <!-- 网站关键词，有助于搜索引擎优化 -->
    <meta name="keywords" content="网站, 正式网站, 示例">
</head>
<body>
    <!-- 网页主标题 -->
    <h1>欢迎来到我的网站！</h1>
</body>
</html>
